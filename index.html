<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Go America!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --bg2: #131922;
  --card: #1a2233;
  --card2: #1e2a3a;
  --border: rgba(255,255,255,0.07);
  --text: #ffffff;
  --muted: rgba(255,255,255,0.45);
  --muted2: rgba(255,255,255,0.25);
  --gold: #f5c842;
  --gold2: #e8b800;
  --green: #2ecc71;
  --green2: #27ae60;
  --pink: #e91e8c;
  --pink2: #c2185b;
  --accent: #4fc3f7;
  --radius: 18px;
  --radius-sm: 12px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* STARS BG */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(79,195,247,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(233,30,140,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 0%, rgba(245,200,66,0.04) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
}

/* STARS */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle var(--d, 3s) var(--delay, 0s) infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0; }
  50% { opacity: var(--op, 0.6); }
}

/* LAYOUT */
.container {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 64px 24px 40px;
  position: relative;
  z-index: 1;
}

.hero-eyebrow {
  font-size: 11px;
  letter-spacing: 5px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
  font-family: 'DM Mono', monospace;
}

.hero-title {
  font-size: clamp(40px, 7vw, 72px);
  font-weight: 900;
  line-height: 1.05;
  margin-bottom: 10px;
  letter-spacing: -1px;
}

.hero-title span { color: var(--gold); }

.hero-sub {
  font-size: 12px;
  letter-spacing: 4px;
  color: var(--muted);
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
  margin-bottom: 36px;
}

/* MODE BUTTONS */
.mode-btns {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 56px;
  flex-wrap: wrap;
}

.mode-btn {
  padding: 14px 28px;
  border-radius: 50px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.mode-btn.teacher {
  background: var(--gold);
  color: #1a1000;
}

.mode-btn.teacher:hover { background: var(--gold2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,200,66,0.3); }

.mode-btn.kids {
  background: transparent;
  color: var(--text);
  border: 2px solid rgba(255,255,255,0.2);
}

.mode-btn.kids:hover { border-color: rgba(255,255,255,0.5); transform: translateY(-2px); }

/* SEASON TABS */
.season-tabs {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.season-tab {
  flex: 1;
  max-width: 300px;
  min-width: 200px;
  padding: 24px 20px;
  border-radius: var(--radius);
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.season-tab::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.15;
  transition: opacity 0.2s;
}

.season-tab.s1 { background: linear-gradient(135deg, #f5c842, #e8960a); }
.season-tab.s2 { background: linear-gradient(135deg, #2ecc71, #1a9e50); opacity: 0.7; }
.season-tab.s3 { background: linear-gradient(135deg, #e91e8c, #9b1060); opacity: 0.7; }

.season-tab.active { border-color: rgba(255,255,255,0.4); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
.season-tab.s1.active { opacity: 1; }
.season-tab.s2.active { opacity: 1; }
.season-tab.s3.active { opacity: 1; }

.season-tab:hover { transform: translateY(-3px); }

.season-emoji { font-size: 32px; margin-bottom: 8px; display: block; }
.season-label { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.7); text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 4px; }
.season-name { font-size: 18px; font-weight: 800; color: #fff; }

/* SECTION LABEL */
.section-label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--gold);
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}

.section-label::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
}

/* CITY GRID */
.city-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
  margin-bottom: 48px;
}

.city-card {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 16px 12px 18px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all 0.2s;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.city-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent);
  pointer-events: none;
}

.city-card:hover {
  background: var(--card2);
  border-color: rgba(255,255,255,0.15);
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.4);
}

.city-card.active {
  border-color: var(--gold);
  box-shadow: 0 0 0 1px var(--gold), 0 12px 32px rgba(245,200,66,0.15);
}

.city-month {
  font-size: 10px;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.city-note {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 10px;
  color: var(--green);
  opacity: 0;
  transition: opacity 0.2s;
}

.city-card.has-tracks .city-note { opacity: 1; }

.city-emoji { font-size: 32px; margin-bottom: 8px; display: block; line-height: 1; }

.city-name {
  font-size: 13px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
}

.city-card:hover .city-name { color: var(--gold); }
.city-card.active .city-name { color: var(--gold); }

/* PLAYER SECTION */
.player-section {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 48px;
  display: none;
}

.player-section.visible { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.player-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
}

.player-city-emoji { font-size: 28px; }

.player-city-info { flex: 1; }
.player-city-name { font-size: 20px; font-weight: 800; }
.player-city-sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; font-family: 'DM Mono', monospace; }

.close-btn {
  background: rgba(255,255,255,0.08);
  border: none;
  color: var(--muted);
  cursor: pointer;
  width: 36px; height: 36px;
  border-radius: 50%;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}

.close-btn:hover { background: rgba(255,255,255,0.15); color: var(--text); }

.player-body {
  display: grid;
  grid-template-columns: 280px 1fr;
}

.player-left {
  padding: 24px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.vinyl-wrap {
  width: 100%;
  aspect-ratio: 1;
  background: rgba(0,0,0,0.3);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
}

.vinyl {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: conic-gradient(#1a1a1a 0deg,#272727 20deg,#1a1a1a 40deg,#272727 60deg,#1a1a1a 80deg,#272727 100deg,#1a1a1a 120deg,#272727 140deg,#1a1a1a 160deg,#272727 180deg,#1a1a1a 200deg,#272727 220deg,#1a1a1a 240deg,#272727 260deg,#1a1a1a 280deg,#272727 300deg,#1a1a1a 320deg,#272727 340deg);
  animation: spin 4s linear infinite paused;
  position: relative;
}

.vinyl.playing { animation-play-state: running; }

.vinyl::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--gold);
}

@keyframes spin { to { transform: rotate(360deg); } }

.now-label { font-size: 9px; letter-spacing: 3px; color: var(--muted); font-family: 'DM Mono', monospace; }
.now-title { font-size: 16px; font-weight: 800; color: var(--text); margin-top: 4px; line-height: 1.2; word-break: break-word; }
.now-artist { font-size: 11px; color: var(--muted); margin-top: 2px; }

.prog-wrap { display: flex; flex-direction: column; gap: 6px; }
.prog-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
.prog-fill { height: 100%; background: var(--gold); border-radius: 2px; width: 0%; transition: width 0.1s linear; pointer-events: none; }
.time-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }

.controls { display: flex; align-items: center; justify-content: center; gap: 12px; }

.ctrl { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 6px; transition: color 0.15s; line-height: 1; }
.ctrl:hover { color: var(--text); }

.play-btn {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--gold);
  border: none;
  color: #1a1000;
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  line-height: 1;
}

.play-btn:hover { background: var(--gold2); transform: scale(1.05); }

.vol-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
.vol-slider { flex: 1; -webkit-appearance: none; height: 3px; background: rgba(255,255,255,0.1); outline: none; cursor: pointer; border-radius: 2px; }
.vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--gold); cursor: pointer; border-radius: 50%; }

.player-right { padding: 20px; overflow-y: auto; max-height: 400px; }

.track-list { display: flex; flex-direction: column; gap: 2px; }

.track-item {
  display: grid;
  grid-template-columns: 32px 1fr auto auto;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.12s;
  border: 1px solid transparent;
}

.track-item:hover { background: rgba(255,255,255,0.05); }
.track-item.active { background: rgba(245,200,66,0.08); border-color: rgba(245,200,66,0.2); }
.track-item.active .ti-num { color: var(--gold); }
.track-item.active .ti-title { color: var(--gold); }

.ti-num { font-size: 11px; color: var(--muted2); text-align: center; font-family: 'DM Mono', monospace; }
.ti-info { min-width: 0; }
.ti-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px; }
.ti-artist { font-size: 10px; color: var(--muted); }
.ti-dur { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }

.bars { display: flex; gap: 2px; align-items: flex-end; height: 13px; opacity: 0; }
.track-item.active .bars { opacity: 1; }
.bar { width: 2px; background: var(--gold); border-radius: 1px; animation: bb 0.7s ease-in-out infinite alternate; }
.bar:nth-child(1) { animation-delay: 0s; height: 5px; }
.bar:nth-child(2) { animation-delay: 0.2s; height: 10px; }
.bar:nth-child(3) { animation-delay: 0.4s; height: 7px; }
.bar.paused { animation-play-state: paused; }
@keyframes bb { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }

.no-tracks { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }

/* ADMIN MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
  backdrop-filter: blur(4px);
}

.modal-overlay.show { opacity: 1; pointer-events: all; }

.modal {
  background: var(--card2);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 36px;
  width: 300px;
  display: flex; flex-direction: column; gap: 16px;
  transform: translateY(16px); transition: transform 0.2s;
  box-shadow: 0 32px 64px rgba(0,0,0,0.5);
}

.modal-overlay.show .modal { transform: translateY(0); }

.modal-title { font-size: 18px; font-weight: 800; color: var(--gold); }

.modal-input {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  padding: 12px 16px;
  outline: none;
  letter-spacing: 8px;
  text-align: center;
  width: 100%;
  border-radius: var(--radius-sm);
  transition: border-color 0.15s;
}

.modal-input:focus { border-color: var(--gold); }
.modal-input.error { border-color: #e74c3c; animation: shake 0.3s; }

@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

.modal-btns { display: flex; gap: 8px; }

.modal-btn {
  flex: 1; padding: 11px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.1);
  background: none;
  color: var(--muted);
  transition: all 0.15s;
}

.modal-btn.ok { background: var(--gold); border-color: var(--gold); color: #1a1000; }
.modal-btn.ok:hover { background: var(--gold2); }
.modal-btn.cancel:hover { color: var(--text); background: rgba(255,255,255,0.05); }

/* FOOTER NOTE */
.footer-note {
  text-align: center;
  padding: 32px 24px;
  color: var(--muted2);
  font-size: 11px;
  letter-spacing: 2px;
  font-family: 'DM Mono', monospace;
  position: relative;
  z-index: 1;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .city-grid { grid-template-columns: repeat(4, 1fr); }
  .player-body { grid-template-columns: 1fr; }
  .player-left { border-right: none; border-bottom: 1px solid var(--border); }
  .season-tab { min-width: 140px; }
}

@media (max-width: 600px) {
  .city-grid { grid-template-columns: repeat(3, 1fr); }
  .season-tabs { gap: 8px; }
  .season-tab { padding: 16px 12px; }
  .season-name { font-size: 14px; }
  .hero { padding: 48px 20px 32px; }
}

@media (max-width: 400px) {
  .city-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">U S</div>
  <h1 class="hero-title">Let's Go <span>America!</span></h1>
  <div class="hero-sub">Season 1 · 2 · 3 — Discovery ABC Jukebox</div>

  <div class="mode-btns">
    <button class="mode-btn teacher" onclick="openModal()">🏠 Teacher Mode</button>
    <button class="mode-btn kids">😊 Kids Mode</button>
  </div>
</div>

<div class="container">

  <!-- SEASON TABS -->
  <div class="season-tabs">
    <div class="season-tab s1 active" onclick="selectSeason(1)">
      <span class="season-emoji">🏙️</span>
      <div class="season-label">Season 1</div>
      <div class="season-name">City Explorer</div>
    </div>
    <div class="season-tab s2" onclick="selectSeason(2)">
      <span class="season-emoji">🧪</span>
      <div class="season-label">Season 2</div>
      <div class="season-name">State Mission Lab</div>
    </div>
    <div class="season-tab s3" onclick="selectSeason(3)">
      <span class="season-emoji">🌋</span>
      <div class="season-label">Season 3</div>
      <div class="season-name">Adventure Science</div>
    </div>
  </div>

  <!-- SEASON 1 -->
  <div id="season1">
    <div class="section-label">Season 1 — City Explorer</div>
    <div class="city-grid" id="cityGrid"></div>
  </div>

  <!-- PLAYER -->
  <div class="player-section" id="playerSection">
    <div class="player-header">
      <span class="player-city-emoji" id="pEmoji"></span>
      <div class="player-city-info">
        <div class="player-city-name" id="pCityName"></div>
        <div class="player-city-sub" id="pCitySub">SEASON 1 · CITY EXPLORER</div>
      </div>
      <button class="close-btn" onclick="closePlayer()">✕</button>
    </div>
    <div class="player-body">
      <div class="player-left">
        <div class="vinyl-wrap">
          <div class="vinyl" id="vinyl"></div>
        </div>
        <div>
          <div class="now-label">NOW PLAYING</div>
          <div class="now-title" id="nowTitle">—</div>
          <div class="now-artist" id="nowArtist">—</div>
        </div>
        <div class="prog-wrap">
          <div class="prog-bar" id="progBar"><div class="prog-fill" id="progFill"></div></div>
          <div class="time-row"><span id="tElapsed">0:00</span><span id="tTotal">0:00</span></div>
        </div>
        <div class="controls">
          <button class="ctrl" id="prevBtn">⏮</button>
          <button class="play-btn" id="playBtn">▶</button>
          <button class="ctrl" id="nextBtn">⏭</button>
        </div>
        <div class="vol-row">
          <span>🔈</span>
          <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.01" value="0.8">
          <span>🔊</span>
        </div>
      </div>
      <div class="player-right">
        <div class="track-list" id="trackList"></div>
      </div>
    </div>
  </div>

</div>

<div class="footer-note">BIGCAT JUKEBOX · Discovery ABC</div>

<audio id="audio"></audio>

<!-- ADMIN MODAL -->
<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <div class="modal-title">🔐 Admin</div>
    <input class="modal-input" type="password" id="adminPw" placeholder="••••" maxlength="20">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn ok" onclick="checkPw()">확인</button>
    </div>
  </div>
</div>

<script>
// ── STARS ─────────────────────────────────────────────────
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `
    left: ${Math.random()*100}%;
    top: ${Math.random()*100}%;
    --d: ${2+Math.random()*4}s;
    --delay: ${Math.random()*4}s;
    --op: ${0.3+Math.random()*0.6};
    width: ${Math.random() > 0.7 ? 3 : 2}px;
    height: ${Math.random() > 0.7 ? 3 : 2}px;
  `;
  starsEl.appendChild(s);
}

// ── CITIES ────────────────────────────────────────────────
const CITIES = [
  { id:'new-york',      name:'New York City',   folder:'NEW YORK',       num:'01', month:'3월',  emoji:'🗽' },
  { id:'texas',         name:'Texas',           folder:'TEXAS',          num:'02', month:'4월',  emoji:'🤠' },
  { id:'harvard',       name:'Harvard',         folder:'HARVARD',        num:'03', month:'5월',  emoji:'🎓' },
  { id:'florida',       name:'Florida',         folder:'FLORIDA',        num:'04', month:'6월',  emoji:'🎢' },
  { id:'iowa',          name:'Iowa',            folder:'IOWA',           num:'05', month:'7월',  emoji:'🌽' },
  { id:'san-francisco', name:'San Francisco',   folder:'SAN FRANCISCO',  num:'06', month:'8월',  emoji:'🌉' },
  { id:'new-orleans',   name:'New Orleans',     folder:'NEW ORLEANS',    num:'07', month:'9월',  emoji:'🎺' },
  { id:'vermont',       name:'Vermont',         folder:'VERMONT',        num:'08', month:'10월', emoji:'🍁' },
  { id:'washington-dc', name:'Washington D.C.', folder:'WASHINGTON D.C', num:'09', month:'11월', emoji:'🏛️' },
  { id:'alaska',        name:'Alaska',          folder:'ALASKA',         num:'10', month:'12월', emoji:'❄️' },
  { id:'minnesota',     name:'Minnesota',       folder:'MINNESOTA',      num:'11', month:'1월',  emoji:'🐟' },
  { id:'hollywood',     name:'Hollywood',       folder:'HOLLYWOOD',      num:'12', month:'2월',  emoji:'🎬' }
];

const audio = document.getElementById('audio');
let tracks = [], currentIndex = 0, isPlaying = false, currentCity = null;

// ── SEASON TABS ───────────────────────────────────────────
function selectSeason(n) {
  document.querySelectorAll('.season-tab').forEach((t,i) => {
    t.classList.toggle('active', i === n-1);
  });
}

// ── RENDER GRID ───────────────────────────────────────────
function renderGrid() {
  document.getElementById('cityGrid').innerHTML = CITIES.map(c => `
    <div class="city-card" id="card-${c.id}" onclick="openCity('${c.id}')">
      <div class="city-month">${c.month}</div>
      <span class="city-note">♪</span>
      <span class="city-emoji">${c.emoji}</span>
      <div class="city-name">${c.name}</div>
    </div>
  `).join('');
  CITIES.forEach(loadCount);
}

async function loadCount(city) {
  try {
    const r = await fetch(`${city.folder}/tracks.json?t=${Date.now()}`);
    if (!r.ok) return;
    const d = await r.json();
    if ((d.tracks?.length || 0) > 0)
      document.getElementById(`card-${city.id}`)?.classList.add('has-tracks');
  } catch {}
}

// ── OPEN CITY ─────────────────────────────────────────────
async function openCity(id) {
  const city = CITIES.find(c => c.id === id);
  if (!city) return;
  currentCity = city;

  document.querySelectorAll('.city-card').forEach(c => c.classList.remove('active'));
  document.getElementById(`card-${id}`)?.classList.add('active');

  document.getElementById('pEmoji').textContent = city.emoji;
  document.getElementById('pCityName').textContent = city.name;
  document.getElementById('trackList').innerHTML = '<div class="no-tracks">로딩 중...</div>';

  const ps = document.getElementById('playerSection');
  ps.classList.add('visible');
  ps.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  audio.pause(); isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('vinyl').classList.remove('playing');

  try {
    const r = await fetch(`${city.folder}/tracks.json?t=${Date.now()}`);
    if (!r.ok) throw 0;
    const d = await r.json();
    tracks = d.tracks || [];
    renderTracks();
    if (tracks.length) selectTrack(0, false);
  } catch {
    document.getElementById('trackList').innerHTML = '<div class="no-tracks">음원이 없습니다</div>';
  }
}

function closePlayer() {
  audio.pause(); isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('vinyl').classList.remove('playing');
  document.getElementById('playerSection').classList.remove('visible');
  document.querySelectorAll('.city-card').forEach(c => c.classList.remove('active'));
}

// ── TRACKS ────────────────────────────────────────────────
function renderTracks() {
  if (!tracks.length) {
    document.getElementById('trackList').innerHTML = '<div class="no-tracks">트랙이 없습니다</div>';
    return;
  }
  document.getElementById('trackList').innerHTML = tracks.map((t, i) => `
    <div class="track-item" id="ti-${i}" onclick="selectTrack(${i},true)">
      <div class="ti-num">${String(i+1).padStart(2,'0')}</div>
      <div class="ti-info">
        <div class="ti-title">${t.title}</div>
        <div class="ti-artist">${t.artist||''}</div>
      </div>
      <div class="bars"><div class="bar paused"></div><div class="bar paused"></div><div class="bar paused"></div></div>
      <div class="ti-dur">${t.duration||''}</div>
    </div>
  `).join('');
}

function selectTrack(i, play) {
  document.querySelectorAll('.track-item').forEach(e => e.classList.remove('active'));
  currentIndex = i;
  const t = tracks[i]; if (!t) return;
  document.getElementById(`ti-${i}`)?.classList.add('active');
  document.getElementById('nowTitle').textContent = t.title;
  document.getElementById('nowArtist').textContent = t.artist || '';
  audio.src = t.file;
  audio.volume = parseFloat(document.getElementById('volSlider').value);
  document.querySelectorAll('.bar').forEach(b => b.classList.add('paused'));
  if (play) {
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸';
      document.getElementById('vinyl').classList.add('playing');
      document.querySelectorAll(`#ti-${i} .bar`).forEach(b => b.classList.remove('paused'));
    }).catch(()=>{});
  } else {
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('vinyl').classList.remove('playing');
  }
}

// ── CONTROLS ──────────────────────────────────────────────
document.getElementById('playBtn').addEventListener('click', () => {
  if (!tracks.length) return;
  if (isPlaying) {
    audio.pause(); isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('vinyl').classList.remove('playing');
    document.querySelectorAll(`#ti-${currentIndex} .bar`).forEach(b => b.classList.add('paused'));
  } else {
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸';
      document.getElementById('vinyl').classList.add('playing');
      document.querySelectorAll(`#ti-${currentIndex} .bar`).forEach(b => b.classList.remove('paused'));
    }).catch(()=>{});
  }
});

document.getElementById('prevBtn').addEventListener('click', () => { if(tracks.length) selectTrack((currentIndex-1+tracks.length)%tracks.length, isPlaying); });
document.getElementById('nextBtn').addEventListener('click', () => { if(tracks.length) selectTrack((currentIndex+1)%tracks.length, isPlaying); });
audio.addEventListener('ended', () => selectTrack((currentIndex+1)%tracks.length, true));

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  document.getElementById('progFill').style.width = (audio.currentTime/audio.duration*100)+'%';
  document.getElementById('tElapsed').textContent = fmt(audio.currentTime);
  document.getElementById('tTotal').textContent = fmt(audio.duration);
});

document.getElementById('progBar').addEventListener('click', e => {
  if (!audio.duration) return;
  const r = document.getElementById('progBar').getBoundingClientRect();
  audio.currentTime = ((e.clientX-r.left)/r.width)*audio.duration;
});

document.getElementById('volSlider').addEventListener('input', e => { audio.volume = parseFloat(e.target.value); });

function fmt(s) { if(isNaN(s)) return '0:00'; return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }

// ── ADMIN ─────────────────────────────────────────────────
const ADMIN_PW = '1234';
let logoClicks = 0, logoTimer = null;

// 로고 제목 5번 클릭
document.querySelector('.hero-title').addEventListener('click', () => {
  logoClicks++;
  clearTimeout(logoTimer);
  logoTimer = setTimeout(() => { logoClicks = 0; }, 2000);
  if (logoClicks >= 5) { logoClicks = 0; openModal(); }
});

function openModal() {
  const i = document.getElementById('adminPw');
  i.value = ''; i.classList.remove('error');
  document.getElementById('adminModal').classList.add('show');
  setTimeout(() => i.focus(), 200);
}

function closeModal() { document.getElementById('adminModal').classList.remove('show'); }

function checkPw() {
  if (document.getElementById('adminPw').value === ADMIN_PW) {
    closeModal(); window.location.href = 'admin.html';
  } else {
    const i = document.getElementById('adminPw');
    i.classList.add('error'); i.value = '';
    setTimeout(() => i.classList.remove('error'), 400);
  }
}

document.getElementById('adminPw').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPw();
  if (e.key === 'Escape') closeModal();
});

document.getElementById('adminModal').addEventListener('click', e => {
  if (e.target.id === 'adminModal') closeModal();
});

renderGrid();
</script>
</body>
</html>
