<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIGCAT JUKEBOX</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --border: #1e1e1e;
  --accent: #e8c84a;
  --red: #c0392b;
  --text: #e8e4dc;
  --muted: #444;
  --muted2: #2a2a2a;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
  pointer-events: none;
  z-index: 9998;
}

.header {
  border-bottom: 2px solid var(--accent);
  padding: 20px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 40px;
  letter-spacing: 6px;
  color: var(--accent);
  text-shadow: 3px 3px 0 var(--red);
  cursor: default;
  user-select: none;
  position: relative;
  line-height: 1;
}

.logo-bar {
  position: absolute;
  bottom: -2px; left: 0;
  height: 2px;
  background: var(--red);
  width: 0%;
  transition: width 0.15s;
  pointer-events: none;
}

.header-sub {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
}

.screen { display: none; }
.screen.active { display: block; }

/* ── CITY GRID ── */
.grid-wrap { padding: 48px 40px; }

.grid-label {
  font-size: 10px;
  letter-spacing: 5px;
  color: var(--muted);
  margin-bottom: 28px;
}

.city-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
}

.city-card {
  aspect-ratio: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 18px;
  transition: border-color 0.2s;
}

.city-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 60%);
  transition: opacity 0.2s;
}

.city-card:hover { border-color: var(--accent); z-index: 1; }
.city-card:hover .c-num { color: var(--accent); }
.city-card:hover .c-name { color: var(--accent); }

.c-dot {
  position: absolute;
  top: 14px; right: 14px;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--muted);
  transition: background 0.3s;
}

.city-card.live .c-dot { background: var(--accent); }

.c-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  color: var(--muted2);
  line-height: 1;
  transition: color 0.2s;
  position: relative;
}

.c-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  letter-spacing: 2px;
  color: var(--text);
  line-height: 1.2;
  transition: color 0.2s;
  position: relative;
}

.c-count {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  position: relative;
  margin-top: 3px;
}

/* ── PLAYER ── */
.player-header {
  padding: 18px 40px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 1px solid var(--border);
}

.back-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  padding: 7px 14px;
  transition: all 0.15s;
}

.back-btn:hover { border-color: var(--accent); color: var(--accent); }

.p-city-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 4px;
  color: var(--accent);
}

.p-city-num {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 3px 9px;
  margin-left: auto;
}

.player-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  min-height: calc(100vh - 122px);
}

.p-left {
  border-right: 1px solid var(--border);
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  position: sticky;
  top: 82px;
  height: calc(100vh - 122px);
}

.vinyl-box {
  width: 100%;
  aspect-ratio: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
}

.vinyl {
  width: 130px; height: 130px;
  border-radius: 50%;
  background: conic-gradient(#181818 0deg,#242424 20deg,#181818 40deg,#242424 60deg,#181818 80deg,#242424 100deg,#181818 120deg,#242424 140deg,#181818 160deg,#242424 180deg,#181818 200deg,#242424 220deg,#181818 240deg,#242424 260deg,#181818 280deg,#242424 300deg,#181818 320deg,#242424 340deg);
  animation: spin 4s linear infinite paused;
  position: relative;
}

.vinyl.playing { animation-play-state: running; }
.vinyl::after {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
}

@keyframes spin { to { transform: rotate(360deg); } }

.now-label { font-size: 9px; letter-spacing: 4px; color: var(--muted); }
.now-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; letter-spacing: 2px; color: var(--accent);
  line-height: 1.1; word-break: break-word; margin-top: 4px;
}
.now-artist { font-size: 10px; color: var(--muted); letter-spacing: 1px; font-style: italic; margin-top: 2px; }

.prog-wrap { display: flex; flex-direction: column; gap: 6px; }
.prog-bar { height: 2px; background: var(--border); cursor: pointer; }
.prog-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; pointer-events: none; }
.time-row { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); letter-spacing: 1px; }

.controls { display: flex; align-items: center; justify-content: center; gap: 16px; }
.ctrl { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 17px; padding: 6px; transition: color 0.15s; line-height: 1; }
.ctrl:hover { color: var(--text); }
.play-btn {
  width: 48px; height: 48px;
  border: 2px solid var(--accent); background: none; color: var(--accent);
  cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; line-height: 1;
}
.play-btn:hover { background: var(--accent); color: var(--bg); }

.vol-row { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--muted); }
.vol-slider { flex: 1; -webkit-appearance: none; height: 2px; background: var(--border); outline: none; cursor: pointer; }
.vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--accent); cursor: pointer; }

.p-right { padding: 28px; }

.track-list { display: flex; flex-direction: column; gap: 1px; }

.track-item {
  display: grid;
  grid-template-columns: 32px 1fr auto auto;
  align-items: center;
  gap: 14px;
  padding: 12px 14px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.12s;
}

.track-item:hover { background: var(--surface); border-color: var(--border); }
.track-item.active { background: #141400; border-color: var(--accent); }
.track-item.active .ti-num { color: var(--accent); }
.track-item.active .ti-title { color: var(--accent); }

.ti-num { font-size: 10px; color: var(--muted); text-align: center; font-style: italic; }
.ti-info { min-width: 0; }
.ti-title { font-size: 13px; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.ti-artist { font-size: 10px; color: var(--muted); letter-spacing: 1px; font-style: italic; }
.ti-dur { font-size: 10px; color: var(--muted); white-space: nowrap; }

.bars { display: flex; gap: 2px; align-items: flex-end; height: 13px; opacity: 0; }
.track-item.active .bars { opacity: 1; }
.bar { width: 2px; background: var(--accent); border-radius: 1px; animation: bb 0.7s ease-in-out infinite alternate; }
.bar:nth-child(1) { animation-delay: 0s; height: 6px; }
.bar:nth-child(2) { animation-delay: 0.2s; height: 10px; }
.bar:nth-child(3) { animation-delay: 0.4s; height: 8px; }
.bar.paused { animation-play-state: paused; }
@keyframes bb { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }

.no-tracks { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); font-size: 11px; letter-spacing: 4px; }

/* ADMIN MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  z-index: 9999; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: #111; border: 2px solid var(--accent);
  padding: 36px; width: 290px;
  display: flex; flex-direction: column; gap: 14px;
  transform: translateY(12px); transition: transform 0.2s;
}
.modal-overlay.show .modal { transform: translateY(0); }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 4px; color: var(--accent); }
.modal-input {
  background: #0a0a0a; border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Mono', monospace;
  font-size: 20px; padding: 11px 14px;
  outline: none; letter-spacing: 8px; text-align: center; width: 100%;
  transition: border-color 0.15s;
}
.modal-input:focus { border-color: var(--accent); }
.modal-input.error { border-color: var(--red); animation: shake 0.3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.modal-btns { display: flex; gap: 8px; }
.modal-btn { flex: 1; padding: 10px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--muted); transition: all 0.15s; }
.modal-btn.ok { border-color: var(--accent); color: var(--accent); }
.modal-btn.ok:hover { background: var(--accent); color: #000; }
.modal-btn.cancel:hover { color: var(--text); }

@media (max-width: 900px) { .city-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 768px) {
  .player-layout { grid-template-columns: 1fr; }
  .p-left { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
  .header { padding: 14px 20px; }
  .grid-wrap { padding: 28px 20px; }
  .player-header { padding: 14px 20px; }
}
@media (max-width: 500px) { .city-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div class="header">
  <div class="logo" id="logoBtn">BIGCAT JUKEBOX<div class="logo-bar" id="logoBar"></div></div>
  <div class="header-sub" id="headerSub">SELECT A CITY</div>
</div>

<!-- GRID SCREEN -->
<div class="screen active" id="screenGrid">
  <div class="grid-wrap">
    <div class="grid-label">— 12 CITIES · CHOOSE YOUR DESTINATION —</div>
    <div class="city-grid" id="cityGrid"></div>
  </div>
</div>

<!-- PLAYER SCREEN -->
<div class="screen" id="screenPlayer">
  <div class="player-header">
    <button class="back-btn" onclick="goBack()">← BACK</button>
    <div class="p-city-name" id="pCityName"></div>
    <div class="p-city-num" id="pCityNum"></div>
  </div>
  <div class="player-layout">
    <div class="p-left">
      <div class="vinyl-box"><div class="vinyl" id="vinyl"></div></div>
      <div>
        <div class="now-label">NOW PLAYING</div>
        <div class="now-title" id="nowTitle">—</div>
        <div class="now-artist" id="nowArtist">—</div>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar" id="progBar"><div class="prog-fill" id="progFill"></div></div>
        <div class="time-row"><span id="tElapsed">0:00</span><span id="tTotal">0:00</span></div>
      </div>
      <div class="controls">
        <button class="ctrl" id="prevBtn">⏮</button>
        <button class="play-btn" id="playBtn">▶</button>
        <button class="ctrl" id="nextBtn">⏭</button>
      </div>
      <div class="vol-row">
        <span>🔈</span>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.01" value="0.8">
        <span>🔊</span>
      </div>
    </div>
    <div class="p-right">
      <div class="track-list" id="trackList"></div>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <div class="modal-title">🔐 ADMIN</div>
    <input class="modal-input" type="password" id="adminPw" placeholder="••••" maxlength="20">
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn ok" onclick="checkPw()">확인</button>
    </div>
  </div>
</div>

<script>
const CITIES = [
  { id:'new-york',      name:'New York',               folder:'NEW YORK',                num:'01' },
  { id:'texas',         name:'Texas',                     folder:'TEXAS',                     num:'02' },
  { id:'harvard',       name:'Harvard',                 folder:'HARVARD',                 num:'03' },
  { id:'florida',       name:'Florida',                   folder:'FLORIDA',                       num:'04' },
  { id:'san-francisco', name:'San Francisco',          folder:'SAN FRANCISCO',           num:'05' },
  { id:'new-orleans',   name:'New Orleans',        folder:'NEW ORLEANS',              num:'06' },
  { id:'iowa',          name:'Iowa',                      folder:'IOWA',                      num:'07' },
  { id:'vermont',       name:'Vermont',                folder:'VERMONT',                 num:'08' },
  { id:'minnesota',     name:'Minnesota',              folder:'MINNESOTA',               num:'09' },
  { id:'alaska',        name:'Alaska',                    folder:'ALASKA',                     num:'10' },
  { id:'washington-dc', name:'Washington D.C.',        folder:'WASHINGTON D.C',          num:'11' },
  { id:'hollywood',     name:'Hollywood',                folder:'HOLLYWOOD',               num:'12' }
];

const audio = document.getElementById('audio');
let tracks = [], currentIndex = 0, isPlaying = false, currentCity = null;

// ── GRID ─────────────────────────────────────────────────
function renderGrid() {
  document.getElementById('cityGrid').innerHTML = CITIES.map(c => `
    <div class="city-card" id="card-${c.id}" onclick="openCity('${c.id}')">
      <div class="c-dot"></div>
      <div class="c-num">${c.num}</div>
      <div class="c-name">${c.name}</div>
      <div class="c-count" id="cnt-${c.id}">— TRACKS</div>
    </div>
  `).join('');
  CITIES.forEach(loadCount);
}

async function loadCount(city) {
  try {
    const r = await fetch(`${city.folder}/tracks.json?t=${Date.now()}`);
    if (!r.ok) return;
    const d = await r.json();
    const n = d.tracks?.length || 0;
    document.getElementById(`cnt-${city.id}`).textContent = `${n} TRACKS`;
    if (n > 0) document.getElementById(`card-${city.id}`).classList.add('live');
  } catch {}
}

// ── OPEN CITY ────────────────────────────────────────────
async function openCity(id) {
  const city = CITIES.find(c => c.id === id);
  if (!city) return;
  currentCity = city;

  document.getElementById('pCityName').textContent = city.name;
  document.getElementById('pCityNum').textContent = city.num;
  document.getElementById('headerSub').textContent = city.name.toUpperCase();
  document.getElementById('trackList').innerHTML = '<div class="no-tracks">LOADING . . .</div>';

  audio.pause(); isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('vinyl').classList.remove('playing');

  document.getElementById('screenGrid').classList.remove('active');
  document.getElementById('screenPlayer').classList.add('active');
  window.scrollTo(0, 0);

  try {
    const r = await fetch(`${city.folder}/tracks.json?t=${Date.now()}`);
    if (!r.ok) throw 0;
    const d = await r.json();
    tracks = d.tracks || [];
    renderTracks();
    if (tracks.length) selectTrack(0, false);
  } catch {
    document.getElementById('trackList').innerHTML = '<div class="no-tracks">음원이 없습니다</div>';
  }
}

function goBack() {
  audio.pause(); isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('vinyl').classList.remove('playing');
  document.getElementById('headerSub').textContent = 'SELECT A CITY';
  document.getElementById('screenPlayer').classList.remove('active');
  document.getElementById('screenGrid').classList.add('active');
  CITIES.forEach(loadCount);
}

// ── TRACKS ───────────────────────────────────────────────
function renderTracks() {
  if (!tracks.length) {
    document.getElementById('trackList').innerHTML = '<div class="no-tracks">트랙이 없습니다</div>';
    return;
  }
  document.getElementById('trackList').innerHTML = tracks.map((t, i) => `
    <div class="track-item" id="ti-${i}" onclick="selectTrack(${i},true)">
      <div class="ti-num">${String(i+1).padStart(2,'0')}</div>
      <div class="ti-info">
        <div class="ti-title">${t.title}</div>
        <div class="ti-artist">${t.artist||''}</div>
      </div>
      <div class="bars"><div class="bar paused"></div><div class="bar paused"></div><div class="bar paused"></div></div>
      <div class="ti-dur">${t.duration||''}</div>
    </div>
  `).join('');
}

function selectTrack(i, play) {
  document.querySelectorAll('.track-item').forEach(e => e.classList.remove('active'));
  currentIndex = i;
  const t = tracks[i]; if (!t) return;
  document.getElementById(`ti-${i}`)?.classList.add('active');
  document.getElementById('nowTitle').textContent = t.title;
  document.getElementById('nowArtist').textContent = t.artist || '';
  audio.src = t.file;
  audio.volume = parseFloat(document.getElementById('volSlider').value);
  document.querySelectorAll('.bar').forEach(b => b.classList.add('paused'));
  if (play) {
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸';
      document.getElementById('vinyl').classList.add('playing');
      document.querySelectorAll(`#ti-${i} .bar`).forEach(b => b.classList.remove('paused'));
    }).catch(()=>{});
  } else {
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('vinyl').classList.remove('playing');
  }
}

// ── CONTROLS ─────────────────────────────────────────────
document.getElementById('playBtn').addEventListener('click', () => {
  if (!tracks.length) return;
  if (isPlaying) {
    audio.pause(); isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('vinyl').classList.remove('playing');
    document.querySelectorAll(`#ti-${currentIndex} .bar`).forEach(b => b.classList.add('paused'));
  } else {
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸';
      document.getElementById('vinyl').classList.add('playing');
      document.querySelectorAll(`#ti-${currentIndex} .bar`).forEach(b => b.classList.remove('paused'));
    }).catch(()=>{});
  }
});

document.getElementById('prevBtn').addEventListener('click', () => { if(tracks.length) selectTrack((currentIndex-1+tracks.length)%tracks.length, isPlaying); });
document.getElementById('nextBtn').addEventListener('click', () => { if(tracks.length) selectTrack((currentIndex+1)%tracks.length, isPlaying); });
audio.addEventListener('ended', () => selectTrack((currentIndex+1)%tracks.length, true));

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  document.getElementById('progFill').style.width = (audio.currentTime/audio.duration*100)+'%';
  document.getElementById('tElapsed').textContent = fmt(audio.currentTime);
  document.getElementById('tTotal').textContent = fmt(audio.duration);
});

document.getElementById('progBar').addEventListener('click', e => {
  if (!audio.duration) return;
  const r = document.getElementById('progBar').getBoundingClientRect();
  audio.currentTime = ((e.clientX-r.left)/r.width)*audio.duration;
});

document.getElementById('volSlider').addEventListener('input', e => { audio.volume = parseFloat(e.target.value); });

function fmt(s) { if(isNaN(s)) return '0:00'; return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }

// ── ADMIN ────────────────────────────────────────────────
const ADMIN_PW = '1234';
let cc = 0, ct = null;

document.getElementById('logoBtn').addEventListener('click', () => {
  cc++;
  document.getElementById('logoBar').style.width = (cc/5*100)+'%';
  clearTimeout(ct);
  ct = setTimeout(() => { cc=0; document.getElementById('logoBar').style.width='0%'; }, 2000);
  if (cc >= 5) { cc=0; document.getElementById('logoBar').style.width='0%'; openModal(); }
});

function openModal() {
  const i = document.getElementById('adminPw');
  i.value=''; i.classList.remove('error');
  document.getElementById('adminModal').classList.add('show');
  setTimeout(()=>i.focus(), 200);
}

function closeModal() { document.getElementById('adminModal').classList.remove('show'); }

function checkPw() {
  if (document.getElementById('adminPw').value === ADMIN_PW) {
    closeModal(); window.location.href = 'admin.html';
  } else {
    const i = document.getElementById('adminPw');
    i.classList.add('error'); i.value='';
    setTimeout(()=>i.classList.remove('error'), 400);
  }
}

document.getElementById('adminPw').addEventListener('keydown', e => { if(e.key==='Enter') checkPw(); if(e.key==='Escape') closeModal(); });
document.getElementById('adminModal').addEventListener('click', e => { if(e.target.id==='adminModal') closeModal(); });

renderGrid();
</script>
</body>
</html>
